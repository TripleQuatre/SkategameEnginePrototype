metadata:
  id: custom_battle_smoke
  title: Custom battle smoke flow
  tags:
    - reference
    - custom
    - battle

setup:
  mode: custom
  structure: battle
  players:
    - Stan
    - Denise
    - Frank
  word: BLADE

steps:
  - name: launch app
    action: launch_app
    expect:
      view: setup

  - name: switch to custom mode
    action: click
    target: setup.mode_custom_radiobutton
    expect:
      view: setup
      text_equals:
        setup.word_entry: SKATE

  - name: set player count
    action: type
    target: setup.player_count_spinbox
    value: "3"
    expect:
      view: setup

  - name: rebuild player fields
    action: press_key
    target: setup.player_count_spinbox
    key: enter
    expect:
      view: setup

  - name: select first player profile
    action: select_option
    target: setup.player_profile_combo.1
    value: Stan
    expect:
      view: setup
      text_equals:
        setup.player_name_entry.1: Stan

  - name: select second player profile
    action: select_option
    target: setup.player_profile_combo.2
    value: Denise
    expect:
      view: setup
      text_equals:
        setup.player_name_entry.2: Denise

  - name: select third player profile
    action: select_option
    target: setup.player_profile_combo.3
    value: Frank
    expect:
      view: setup
      text_equals:
        setup.player_name_entry.3: Frank

  - name: set custom word
    action: type
    target: setup.word_entry
    value: BLADE
    expect:
      view: setup
      text_equals:
        setup.word_entry: BLADE

  - name: start custom battle
    action: click
    target: setup.start_game_button
    expect:
      view: match
      status_text_equals: Game started.
      score_cells:
        1,0: STAN
        1,2: DENISE
        1,4: FRANK
        2,0: "-"
        2,2: "-"
        2,4: "-"
      button_states:
        match.add_player_button: normal
        match.remove_player_button: normal

  - name: open setup details
    action: click
    target: match.setup_details_button
    expect:
      view: setup_details
      text_contains:
        setup_details.body_label: "Structure: battle"

  - name: shutdown app
    action: shutdown_app
