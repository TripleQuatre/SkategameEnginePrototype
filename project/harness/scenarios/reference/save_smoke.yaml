metadata:
  id: save_smoke
  title: Save action smoke flow
  tags:
    - reference
    - save

setup:
  mode: preset
  preset: classic_skate
  players:
    - Stan
    - Denise

steps:
  - name: launch app
    action: launch_app
    expect:
      view: setup

  - name: select first player profile
    action: select_option
    target: setup.player_profile_combo.1
    value: Stan
    expect:
      view: setup
      text_equals:
        setup.player_name_entry.1: Stan

  - name: select second player profile
    action: select_option
    target: setup.player_profile_combo.2
    value: Denise
    expect:
      view: setup
      text_equals:
        setup.player_name_entry.2: Denise

  - name: start game
    action: click
    target: setup.start_game_button
    expect:
      view: match

  - name: save game
    action: click
    target: match.save_button
    expect:
      view: match
      status_text_contains: Game saved to

  - name: shutdown app
    action: shutdown_app
