metadata:
  id: choice_order_roster_addition_regression
  title: Choice-order battle keeps a coherent base order after adding a player
  tags:
    - regression
    - roster
    - order

setup:
  mode: custom
  structure: battle
  players:
    - Stan
    - Denise
    - Alex
  word: OUT

steps:
  - name: launch app
    action: launch_app
    expect:
      view: setup

  - name: switch to custom mode
    action: click
    target: setup.mode_custom_radiobutton
    expect:
      view: setup

  - name: set player count
    action: type
    target: setup.player_count_spinbox
    value: "3"
    expect:
      view: setup

  - name: rebuild player fields
    action: press_key
    target: setup.player_count_spinbox
    key: enter
    expect:
      view: setup

  - name: select first player profile
    action: select_option
    target: setup.player_profile_combo.1
    value: Stan
    expect:
      view: setup
      text_equals:
        setup.player_name_entry.1: Stan

  - name: select second player profile
    action: select_option
    target: setup.player_profile_combo.2
    value: Denise
    expect:
      view: setup
      text_equals:
        setup.player_name_entry.2: Denise

  - name: select third player profile
    action: select_option
    target: setup.player_profile_combo.3
    value: Alex
    expect:
      view: setup
      text_equals:
        setup.player_name_entry.3: Alex

  - name: set word OUT
    action: type
    target: setup.word_entry
    value: OUT
    expect:
      view: setup
      text_equals:
        setup.word_entry: OUT

  - name: move Alex upward once
    action: click
    target: setup.player_move_up_button.3
    expect:
      view: setup
      text_equals:
        setup.order_preview_label: "Order preview: Stan -> Alex -> Denise"

  - name: move Alex upward twice
    action: click
    target: setup.player_move_up_button.2
    expect:
      view: setup
      text_equals:
        setup.order_preview_label: "Order preview: Alex -> Stan -> Denise"

  - name: start choice order battle
    action: click
    target: setup.start_game_button
    expect:
      view: match
      status_text_equals: Game started.
      text_equals:
        match.phase_title_label: Alex sets the next trick

  - name: queue player join response
    action: queue_prompt_response
    value: Frank

  - name: add fourth player
    action: click
    target: match.add_player_button
    expect:
      view: match
      status_text_contains: joined the game
      score_cells:
        1,0: ALEX
        1,2: STAN
        1,4: DENISE
        1,6: FRANK

  - name: open setup details after join
    action: click
    target: match.setup_details_button
    expect:
      view: setup_details
      text_contains:
        setup_details.body_label: "Base order: Alex, Stan, Denise, Frank"

  - name: shutdown app
    action: shutdown_app
