metadata:
  id: undo_restores_multiple_attack_change_controls_regression
  title: Undo restores multiple attack change controls safely
  tags:
    - regression
    - multiple_attack
    - undo

setup:
  mode: custom
  players:
    - Stan
    - Denise

steps:
  - name: launch app
    action: launch_app
    expect:
      view: setup

  - name: switch to custom mode
    action: click
    target: setup.mode_custom_radiobutton
    expect:
      view: setup

  - name: select first player profile
    action: select_option
    target: setup.player_profile_combo.1
    value: Stan
    expect:
      view: setup

  - name: select second player profile
    action: select_option
    target: setup.player_profile_combo.2
    value: Denise
    expect:
      view: setup

  - name: set attack attempts
    action: type
    target: setup.attack_attempts_spinbox
    value: "2"
    expect:
      view: setup

  - name: set repetition limit
    action: type
    target: setup.repetition_limit_spinbox
    value: "4"
    expect:
      view: setup

  - name: enable multiple attack
    action: click
    target: setup.multiple_attack_enabled_button
    expect:
      view: setup

  - name: start game
    action: click
    target: setup.start_game_button
    expect:
      view: match
      status_text_equals: Game started.

  - name: search soul
    action: type
    target: match.trick_entry
    value: soul
    expect:
      view: match
      dropdown_contains:
        - Soul

  - name: select soul
    action: select_suggestion
    target: match.trick_suggestions_listbox
    value: Soul
    expect:
      view: match
      status_text_equals: Valid trick selected.

  - name: confirm soul
    action: click
    target: match.confirm_trick_button
    expect:
      view: match
      text_equals:
        match.trick_label: "Trick: Soul"

  - name: fail first attempt
    action: click
    target: match.failure_button
    expect:
      view: match
      text_contains:
        match.phase_description_label: "You may keep this trick or change it."

  - name: search makio
    action: type
    target: match.trick_entry
    value: makio
    expect:
      view: match
      dropdown_contains:
        - Makio

  - name: select makio
    action: select_suggestion
    target: match.trick_suggestions_listbox
    value: Makio
    expect:
      view: match
      status_text_equals: Valid trick selected.

  - name: change trick
    action: click
    target: match.confirm_trick_button
    expect:
      view: match
      status_text_equals: Attack trick changed to 'Makio'.
      text_equals:
        match.trick_label: "Trick: Makio"

  - name: undo changed trick
    action: click
    target: match.undo_button
    expect:
      view: match
      status_text_contains: Undo successful
      text_equals:
        match.trick_label: "Trick: Soul"
      text_contains:
        match.phase_description_label: "You may keep this trick or change it."
        match.confirm_trick_button: "Change trick"

  - name: search makio again
    action: type
    target: match.trick_entry
    value: makio
    expect:
      view: match
      dropdown_contains:
        - Makio

  - name: shutdown app
    action: shutdown_app
