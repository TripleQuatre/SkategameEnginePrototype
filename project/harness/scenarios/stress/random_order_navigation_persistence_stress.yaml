metadata:
  id: random_order_navigation_persistence_stress
  title: Random order stays coherent through navigation save load and setup details
  tags:
    - stress
    - order
    - random
    - battle
    - history
    - setup_details
    - save_load
    - new_game

setup:
  mode: custom
  structure: battle
  players:
    - Stan
    - Denise
    - Alex
  word: OUT

steps:
  - name: launch app
    action: launch_app
    expect:
      view: setup

  - name: switch to custom mode
    action: click
    target: setup.mode_custom_radiobutton
    expect:
      view: setup

  - name: set player count
    action: type
    target: setup.player_count_spinbox
    value: "3"
    expect:
      view: setup

  - name: rebuild player fields
    action: press_key
    target: setup.player_count_spinbox
    key: enter
    expect:
      view: setup

  - name: select first player profile
    action: select_option
    target: setup.player_profile_combo.1
    value: Stan
    expect:
      view: setup
      text_equals:
        setup.player_name_entry.1: Stan

  - name: select second player profile
    action: select_option
    target: setup.player_profile_combo.2
    value: Denise
    expect:
      view: setup
      text_equals:
        setup.player_name_entry.2: Denise

  - name: select third player profile
    action: select_option
    target: setup.player_profile_combo.3
    value: Alex
    expect:
      view: setup
      text_equals:
        setup.player_name_entry.3: Alex

  - name: set custom word
    action: type
    target: setup.word_entry
    value: OUT
    expect:
      view: setup
      text_equals:
        setup.word_entry: OUT

  - name: select random order mode
    action: select_option
    target: setup.order_mode_combo
    value: random
    expect:
      view: setup
      text_equals:
        setup.order_preview_label: "Order preview: randomized at game start."

  - name: start random order battle
    action: click
    target: setup.start_game_button
    expect:
      view: match
      status_text_equals: Game started.

  - name: open setup details before save
    action: click
    target: match.setup_details_button
    expect:
      view: setup_details
      text_contains:
        setup_details.body_label: "Order: random"

  - name: back from setup details before save
    action: click
    target: setup_details.back_to_game_button
    expect:
      view: match

  - name: search soul
    action: type
    target: match.trick_entry
    value: soul
    expect:
      view: match
      dropdown_contains:
        - Soul

  - name: select soul
    action: select_suggestion
    target: match.trick_suggestions_listbox
    value: Soul
    expect:
      view: match
      status_text_equals: Valid trick selected.

  - name: confirm soul
    action: click
    target: match.confirm_trick_button
    expect:
      view: match
      text_equals:
        match.trick_label: "Trick: Soul"

  - name: land attack
    action: click
    target: match.success_button
    expect:
      view: match

  - name: miss defense and reopen turn
    action: click
    target: match.failure_button
    expect:
      view: match

  - name: open history during random order session
    action: click
    target: match.history_button
    expect:
      view: history

  - name: back from history during random order session
    action: click
    target: history.back_to_game_button
    expect:
      view: match

  - name: save random order battle
    action: click
    target: match.save_button
    expect:
      view: match
      status_text_contains: Game saved to

  - name: return to setup from random order battle
    action: click
    target: match.new_game_button
    expect:
      view: setup
      status_text_equals: Configure the game to begin.

  - name: select latest save
    action: set_load_selection
    value: latest

  - name: load random order battle
    action: click
    target: setup.load_from_setup_button
    expect:
      view: match
      status_text_contains: Game loaded from

  - name: open setup details after load
    action: click
    target: match.setup_details_button
    expect:
      view: setup_details
      text_contains:
        setup_details.body_label: "Order: random"

  - name: shutdown app
    action: shutdown_app
