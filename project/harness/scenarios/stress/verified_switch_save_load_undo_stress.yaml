metadata:
  id: verified_switch_save_load_undo_stress
  title: Verified switch survives save load and undo around confirmation
  tags:
    - stress
    - switch
    - verified
    - save_load
    - undo

setup:
  mode: preset
  preset: duel_verified_switch_v10_1
  players:
    - Stan
    - Denise

steps:
  - name: launch app
    action: launch_app
    expect:
      view: setup

  - name: select verified switch duel preset
    action: select_option
    target: setup.preset_combo
    value: duel_verified_switch_v10_1
    expect:
      view: setup
      text_equals:
        setup.preset_combo: duel_verified_switch_v10_1

  - name: select first player profile
    action: select_option
    target: setup.player_profile_combo.1
    value: Stan
    expect:
      view: setup
      text_equals:
        setup.player_name_entry.1: Stan

  - name: select second player profile
    action: select_option
    target: setup.player_profile_combo.2
    value: Denise
    expect:
      view: setup
      text_equals:
        setup.player_name_entry.2: Denise

  - name: start game
    action: click
    target: setup.start_game_button
    expect:
      view: match
      status_text_equals: Game started.

  - name: search switch soul
    action: type
    target: match.trick_entry
    value: switch soul
    expect:
      view: match
      dropdown_contains:
        - Soul Switch

  - name: select soul switch
    action: select_suggestion
    target: match.trick_suggestions_listbox
    value: Soul Switch
    expect:
      view: match
      status_text_equals: Valid trick selected.

  - name: confirm switch soul
    action: click
    target: match.confirm_trick_button
    expect:
      view: match
      text_equals:
        match.phase_title_label: Stan attacks
        match.trick_label: "Trick: Soul Switch"
      button_states:
        match.success_button: disabled
        match.failure_button: normal
        match.switch_normal_verified_button: normal
        match.switch_normal_not_verified_button: normal

  - name: save pending verified switch attack
    action: click
    target: match.save_button
    expect:
      view: match
      status_text_contains: Game saved to

  - name: return to setup
    action: click
    target: match.new_game_button
    expect:
      view: setup
      status_text_equals: Configure the game to begin.

  - name: select latest save
    action: set_load_selection
    value: latest

  - name: load pending verified switch attack
    action: click
    target: setup.load_from_setup_button
    expect:
      view: match
      status_text_contains: Game loaded from
      text_equals:
        match.phase_title_label: Stan attacks
        match.trick_label: "Trick: Soul Switch"
      button_states:
        match.success_button: disabled
        match.failure_button: normal
        match.switch_normal_verified_button: normal
        match.switch_normal_not_verified_button: normal

  - name: confirm normal verified
    action: click
    target: match.switch_normal_verified_button
    expect:
      view: match
      status_text_equals: Stan landed 'Soul Switch' and verified the normal version to set the trick.
      text_equals:
        match.phase_title_label: Stan attacks
      text_contains:
        match.phase_description_label: "Current defender: Denise"

  - name: undo back to verified attack
    action: click
    target: match.undo_button
    expect:
      view: match
      status_text_contains: Undo successful
      text_equals:
        match.phase_title_label: Stan attacks
        match.trick_label: "Trick: Soul Switch"
      button_states:
        match.success_button: disabled
        match.failure_button: normal
        match.switch_normal_verified_button: normal
        match.switch_normal_not_verified_button: normal

  - name: confirm normal not verified
    action: click
    target: match.switch_normal_not_verified_button
    expect:
      view: match
      status_text_contains: failed the normal verification
      text_equals:
        match.phase_title_label: Stan attacks
      button_states:
        match.switch_normal_verified_button: normal
        match.switch_normal_not_verified_button: normal

  - name: shutdown app
    action: shutdown_app
