metadata:
  id: undo_chain_recovery_stress
  title: Recover from a deep undo chain and re-open trick input safely
  tags:
    - stress
    - undo
    - regression

setup:
  mode: preset
  preset: duel_long_open_v9_3
  players:
    - Stan
    - Denise

steps:
  - name: launch app
    action: launch_app
    expect:
      view: setup

  - name: select long duel preset
    action: select_option
    target: setup.preset_combo
    value: duel_long_open_v9_3
    expect:
      view: setup
      text_equals:
        setup.preset_combo: duel_long_open_v9_3

  - name: enter first player
    action: type
    target: setup.player_name_entry.1
    value: Stan
    expect:
      view: setup

  - name: enter second player
    action: type
    target: setup.player_name_entry.2
    value: Denise
    expect:
      view: setup

  - name: start game
    action: click
    target: setup.start_game_button
    expect:
      view: match
      status_text_equals: Game started.

  - name: search soul
    action: type
    target: match.trick_entry
    value: soul
    expect:
      view: match
      dropdown_contains:
        - Soul

  - name: select soul
    action: select_suggestion
    target: match.trick_suggestions_listbox
    value: Soul
    expect:
      view: match
      status_text_equals: Valid trick selected.

  - name: confirm soul
    action: click
    target: match.confirm_trick_button
    expect:
      view: match
      text_equals:
        match.trick_label: "Trick: Soul"
      button_states:
        match.add_player_button: disabled

  - name: open history
    action: click
    target: match.history_button
    expect:
      view: history

  - name: back to match
    action: click
    target: history.back_to_game_button
    expect:
      view: match

  - name: undo to open turn
    action: click
    target: match.undo_button
    expect:
      view: match
      status_text_contains: Undo successful
      text_equals:
        match.phase_title_label: Stan sets the next trick
      button_states:
        match.add_player_button: normal

  - name: search switch soul again
    action: type
    target: match.trick_entry
    value: switch soul
    expect:
      view: match
      dropdown_contains:
        - Soul Switch

  - name: undo back to setup
    action: click
    target: match.undo_button
    expect:
      view: setup
      status_text_equals: Undo successful. Returned to setup.
      button_states:
        setup.start_game_button: normal

  - name: restart game
    action: click
    target: setup.start_game_button
    expect:
      view: match
      status_text_equals: Game started.

  - name: search soul after deep undo
    action: type
    target: match.trick_entry
    value: soul
    expect:
      view: match
      dropdown_contains:
        - Soul

  - name: shutdown app
    action: shutdown_app
