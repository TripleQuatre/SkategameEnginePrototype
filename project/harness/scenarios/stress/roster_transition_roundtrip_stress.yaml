metadata:
  id: roster_transition_roundtrip_stress
  title: Roster transitions can switch structure and undo back cleanly
  tags:
    - stress
    - roster
    - transitions

setup:
  mode: preset
  preset: classic_skate_v8
  players:
    - Stan
    - Denise

steps:
  - name: launch app
    action: launch_app
    expect:
      view: setup

  - name: select V9 duel preset
    action: select_option
    target: setup.preset_combo
    value: classic_skate_v8
    expect:
      view: setup

  - name: enter first player
    action: type
    target: setup.player_name_entry.1
    value: Stan
    expect:
      view: setup

  - name: enter second player
    action: type
    target: setup.player_name_entry.2
    value: Denise
    expect:
      view: setup

  - name: start game
    action: click
    target: setup.start_game_button
    expect:
      view: match

  - name: queue player join response
    action: queue_prompt_response
    value: Frank

  - name: add third player
    action: click
    target: match.add_player_button
    expect:
      view: match
      status_text_contains: joined the game
      score_cells:
        1,0: STAN
        1,2: DENISE
        1,4: FRANK

  - name: open setup details in battle
    action: click
    target: match.setup_details_button
    expect:
      view: setup_details
      text_contains:
        setup_details.body_label: "Structure: battle"

  - name: back from battle setup details
    action: click
    target: setup_details.back_to_game_button
    expect:
      view: match

  - name: queue player removal response
    action: queue_prompt_response
    value: Frank

  - name: remove third player
    action: click
    target: match.remove_player_button
    expect:
      view: match
      status_text_contains: left the game
      score_cells:
        1,0: STAN
        1,2: DENISE

  - name: open setup details in duel
    action: click
    target: match.setup_details_button
    expect:
      view: setup_details
      text_contains:
        setup_details.body_label: "Structure: one_vs_one"

  - name: back from duel setup details
    action: click
    target: setup_details.back_to_game_button
    expect:
      view: match

  - name: undo roster roundtrip
    action: click
    target: match.undo_button
    expect:
      view: match
      status_text_contains: Undo successful
      score_cells:
        1,0: STAN
        1,2: DENISE
        1,4: FRANK

  - name: shutdown app
    action: shutdown_app
